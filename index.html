<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Unendliche Vorhersageberechnung</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.panel{
width:800px;
margin:auto;
margin-top:40px;
padding:25px;
background:#1e293b;
border-radius:12px;
}

.log{
height:500px;
overflow:auto;
background:#020617;
padding:15px;
border-radius:8px;
text-align:left;
font-size:15px;
}

button{
margin-top:20px;
padding:12px 24px;
font-size:16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
.blue{color:#38bdf8;}

</style>
</head>

<body>

<h1>Der Vorhersager denkt weiter…</h1>
<p>Der Vorhersager versucht eine Zukunftsaussage zu finden, die auch dann noch stimmt, wenn Philip sie hört.</p>

<div class="panel">
<h2>Gedankengang des Vorhersagers</h2>
<div id="log" class="log"></div>
<button onclick="start()">Simulation starten</button>
</div>

<script>

const numbers=[1,5,12,42,88]

let philipNumber=numbers[Math.floor(Math.random()*numbers.length)]

function philipReaction(prediction){

if(prediction===philipNumber){

for(let n of numbers){
if(n!==prediction) return n
}

}

return philipNumber
}

function log(text,cls=""){
let el=document.getElementById("log")
let d=document.createElement("div")
d.innerHTML=text
if(cls)d.classList.add(cls)
el.appendChild(d)
el.scrollTop=el.scrollHeight
}

function start(){

document.getElementById("log").innerHTML=""

log("Philip hat bereits eine Zahl gewählt.","blue")
log("Ich berechne eine Vorhersage, die auch dann stimmt, wenn ich sie ausspreche.","blue")

let step=0

function think(){

let guess=numbers[step % numbers.length]

log("<br>Hypothese: Wenn ich '"+guess+"' vorhersage ...","green")

let reaction=philipReaction(guess)

if(reaction!==guess){

log("Dann würde Philip seine Zahl zu '"+reaction+"' ändern.","red")
log("Also wäre meine Vorhersage falsch.","red")
log("→ Neue Berechnung notwendig.","red")

}else{

log("Diese Vorhersage bleibt stabil.","green")

}

step++

setTimeout(think,1200)

}

setTimeout(think,1200)

}

</script>

</body>
</html>
