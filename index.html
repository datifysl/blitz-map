<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Vorhersage Rückkopplung</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

.container{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
margin-top:40px;
}

.box{
width:260px;
height:200px;
background:#1e293b;
border-radius:12px;
padding:20px;
position:relative;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.number{
font-size:48px;
margin-top:20px;
transition:all 0.5s;
}

.arrow{
font-size:50px;
opacity:0.7;
}

.timeline{
width:900px;
margin:auto;
margin-top:40px;
background:#020617;
border-radius:10px;
height:250px;
overflow:auto;
text-align:left;
padding:15px;
font-size:14px;
}

button{
margin-top:30px;
padding:12px 24px;
font-size:16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.step{
margin-bottom:6px;
}

.predict{color:#22c55e;}
.react{color:#f97316;}
.calc{color:#38bdf8;}

</style>
</head>

<body>

<h1>Selbstreferenz-Vorhersage</h1>
<p>Der Vorhersager simuliert Philips Reaktion auf seine eigene Vorhersage.</p>

<div class="container">

<div class="box">
<h3>🔮 Vorhersager</h3>
<div id="prediction" class="number">?</div>
</div>

<div class="arrow">➡</div>

<div class="box">
<h3>👤 Philips Reaktion</h3>
<div id="reaction" class="number">?</div>
</div>

</div>

<button onclick="start()">Simulation starten</button>

<div class="timeline" id="timeline"></div>

<script>

const numbers=[1,5,12,42,88]

let philipNumber=numbers[Math.floor(Math.random()*numbers.length)]
let step=0

function log(text,cls){

let line=document.createElement("div")
line.className="step "+cls
line.innerHTML=text

let tl=document.getElementById("timeline")
tl.appendChild(line)
tl.scrollTop=tl.scrollHeight

}

function philipReaction(prediction){

if(prediction===philipNumber){

for(let n of numbers){
if(n!==prediction) return n
}

}

return philipNumber
}

function start(){

step=0
document.getElementById("timeline").innerHTML=""

function think(){

let guess=numbers[step % numbers.length]

document.getElementById("prediction").textContent=guess

log("Vorhersager denkt: Wenn ich '"+guess+"' sage …","predict")

let reaction=philipReaction(guess)

setTimeout(()=>{

document.getElementById("reaction").textContent=reaction

log("Philip würde darauf '"+reaction+"' wählen.","react")

if(reaction!==guess){

log("→ Vorhersage wäre falsch → neue Berechnung.","calc")

}else{

log("→ Vorhersage wäre stabil.","calc")

}

step++

},600)

setTimeout(think,1800)

}

think()

}

</script>

</body>
</html>
